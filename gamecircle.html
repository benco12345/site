<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Catch the Circles - Full Game</title>
    <style>
        /* כאן כל ה-CSS המקורי שלך (הוספתי רק את מה שצריך עבור השדרוג החדש) */
        body { margin: 0; background-color: red; overflow: hidden; font-family: sans-serif; }
        #game-area { width: 100vw; height: 100vh; position: absolute; }
        .circle { position: absolute; border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .panel { display: none; position: absolute; bottom: 80px; width: 300px; background: rgba(50,50,50,0.95); color: white; padding: 20px; border-radius: 15px; z-index: 1000; }
        .btn-action { padding: 12px; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 5px; width: 100%; margin-top: 5px; }
        #score-hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 28px; color: white; background: rgba(0,0,0,0.7); padding: 10px 30px; border-radius: 15px; }
    </style>
</head>
<body>

    <div id="score-hud">ניקוד: <span id="scoreDisplay">0</span></div>
    <div id="game-area"></div>

    <nav style="position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px;">
        <button class="btn-action" style="width: auto;" onclick="togglePanel('menu-panel')">תפריט 🛠️</button>
        <button class="btn-action" style="width: auto;" onclick="togglePanel('stats-panel')">סטטיסטיקה 📊</button>
    </nav>

    <section id="menu-panel" class="panel">
        <h3>שדרוגים</h3>
        <div class="upgrade-box">
            <p><strong>Circle Lifetime:</strong> <span id="lifetimeDisplay">10</span>s</p>
            <button class="btn-action" onclick="buyLifetime()">שדרג זמן (מחיר: <span id="costLifetime">25</span>)</button>
        </div>
        <button class="btn-action" onclick="saveGame()">הורד שמירה (.txt)</button>
    </section>

    <section id="stats-panel" class="panel">
        <h3>סטטיסטיקה וצ'יטים</h3>
        <p>הקש INFINITE לביטול זמן:</p>
        <input type="text" id="editLifetime" oninput="applyCheatEdits()">
    </section>

    <script>
        // המצב המלא שמשלב את כל הנתונים
        let state = { 
            score: 0, 
            circleLifetime: 10, 
            costLifetime: 25, 
            isInfinite: false,
            pointsPerClick: 1 
        };

        function togglePanel(id) {
            const p = document.getElementById(id);
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = Math.floor(state.score);
            document.getElementById('lifetimeDisplay').innerText = state.isInfinite ? "∞" : state.circleLifetime;
            document.getElementById('costLifetime').innerText = state.costLifetime;
        }

        function buyLifetime() {
            if (state.score >= state.costLifetime) {
                state.score -= state.costLifetime;
                if (state.circleLifetime < 100) state.circleLifetime += 10;
                else state.isInfinite = true;
                state.costLifetime = Math.floor(state.costLifetime * 1.5);
                updateUI();
            }
        }

        function applyCheatEdits() {
            const val = document.getElementById('editLifetime').value.toUpperCase();
            if (val === 'INFINITE') {
                state.isInfinite = true;
                updateUI();
            }
        }

        function spawnCircle() {
            const circle = document.createElement('div');
            circle.className = 'circle';
            circle.style.width = circle.style.height = '50px';
            circle.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
            circle.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            circle.style.top = Math.random() * (window.innerHeight - 50) + 'px';

            if (!state.isInfinite) {
                circle.dataset.timer = setTimeout(() => circle.remove(), state.circleLifetime * 1000);
            }

            circle.onclick = function() {
                if (this.dataset.timer) clearTimeout(this.dataset.timer);
                state.score += state.pointsPerClick;
                this.remove();
                updateUI();
            };
            document.getElementById('game-area').appendChild(circle);
        }

        function saveGame() {
            const blob = new Blob([JSON.stringify(state)], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'save.txt'; a.click();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'a') togglePanel('menu-panel');
            if (e.key === 's') togglePanel('stats-panel');
            if (e.key === ' ') {
                const circles = document.querySelectorAll('.circle');
                if (circles.length > 0) circles[0].click();
            }
        });

        setInterval(spawnCircle, 1000);
        updateUI();
    </script>
</body>
</html>
