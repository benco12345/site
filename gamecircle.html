<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch the Circles Game</title>
    <style>
        body { margin: 0; background-color: red; overflow: hidden; height: 100vh; }
        #score-hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 28px; font-weight: bold; color: white; background: rgba(0,0,0,0.7); padding: 10px 30px; border-radius: 15px; pointer-events: none; }
        #devCodeInput { position: absolute; top: 10px; right: 10px; z-index: 100; width: 100px; padding: 5px; }
        #game-area { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        .circle { position: absolute; border-radius: 50%; cursor: pointer; animation: popIn 0.3s forwards; }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <input type="text" id="devCodeInput" placeholder="Enter code...">
    <div id="score-hud">Score: <span id="scoreDisplay">0</span></div>
    <div id="game-area"></div>

    <script>
        let state = {
            score: 0,
            maxCircles: 5,
            spawnRateMs: 1000,
            circleLifetime: 10000, // 10 שניות
            isInfiniteLifetime: false
        };

        let currentCircles = 0;
        const gameArea = document.getElementById('game-area');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const devCodeInput = document.getElementById('devCodeInput');

        // צ'יט אינסוף
        devCodeInput.addEventListener('input', function() {
            if (this.value.toUpperCase() === 'INFINITE') {
                state.isInfiniteLifetime = true;
                this.value = '';
                this.blur();
                alert("Infinite Lifetime Activated!");
            }
        });

        function spawnCircle() {
            if (currentCircles >= state.maxCircles) return;

            const circle = document.createElement('div');
            circle.classList.add('circle');
            const size = 50;
            circle.style.width = size + 'px';
            circle.style.height = size + 'px';
            circle.style.backgroundColor = 'white';
            circle.style.left = Math.random() * (window.innerWidth - size) + 'px';
            circle.style.top = Math.random() * (window.innerHeight - size) + 'px';

            let timer;
            if (!state.isInfiniteLifetime) {
                timer = setTimeout(() => {
                    if (circle.parentElement) {
                        circle.remove();
                        currentCircles--;
                        state.score = Math.max(0, state.score - 5);
                        scoreDisplay.innerText = state.score;
                    }
                }, state.circleLifetime);
            }

            circle.onclick = function() {
                if (!state.isInfiniteLifetime) clearTimeout(timer);
                state.score += 1;
                currentCircles--;
                this.remove();
                scoreDisplay.innerText = state.score;
            };

            gameArea.appendChild(circle);
            currentCircles++;
        }

        setInterval(spawnCircle, state.spawnRateMs);
    </script>
</body>
</html>
