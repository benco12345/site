<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch the Circles Game</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
            background-color: red;
            position: relative;
        }

        /* Secret Dev Input */
        #devCodeInput {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
            color: black;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid black;
            padding: 5px;
            font-weight: bold;
            width: 80px;
        }

        /* Score Display */
        #score-hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 30px;
            border-radius: 15px;
            z-index: 50;
            pointer-events: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Menu Button - Bottom Left */
        #menu-toggle-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px black;
            border: 3px solid white;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 300% 300%;
            animation: rainbowColors 3s ease infinite;
        }

        /* Stats Button - Bottom Right */
        #stats-toggle-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: #607D8B;
            border: 3px solid white;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            transition: background 0.3s;
        }

        #stats-toggle-btn:hover { background: #455A64; }

        @keyframes rainbowColors {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Hidden Menu Panel */
        #menu-panel {
            position: absolute;
            bottom: 80px;
            left: 20px;
            z-index: 999;
            width: 300px;
            max-height: 75vh;
            overflow-y: auto;
            background: rgba(50, 50, 50, 0.95);
            color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: none; 
            border: 2px solid #555;
        }

        /* Hidden Stats Panel */
        #stats-panel {
            position: absolute;
            bottom: 80px;
            right: 20px;
            z-index: 999;
            width: 300px;
            background: rgba(40, 40, 60, 0.95);
            color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            display: none; 
            border: 2px solid #555;
        }

        h3 { margin-top: 0; color: #4CAF50; }
        #stats-panel h3 { color: #03A9F4; }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 15px;
        }

        /* Styling for the editable inputs in Stats */
        .stat-input {
            width: 80px; /* קצת יותר רחב בשביל מספרים גדולים של ניקוד */
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #777;
            background: #fff;
            color: #000;
            font-weight: bold;
            text-align: center;
        }

        /* When disabled (normal mode), look like normal text */
        .stat-input:disabled {
            background: transparent;
            border: none;
            color: #FFEB3B;
            font-size: 16px;
            text-align: right;
            appearance: none;
            -moz-appearance: textfield;
        }

        #game-area {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3), 0 0 10px rgba(0,0,0,0.5);
            transform: scale(0);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes popIn { to { transform: scale(1); } }

        button.menu-btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            cursor: pointer;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        button.menu-btn:hover { background: #1976D2; }
        button.menu-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        
        .save-load-btn { background: #FF9800 !important; color: #111 !important; }
        .save-load-btn:hover { background: #F57C00 !important; }

        .upgrade-box { background: #444; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .upgrade-box p { margin: 0 0 10px 0; font-size: 15px; }
        hr { border: 1px solid #777; margin: 20px 0; }
    </style>
</head>
<body>

    <input type="text" id="devCodeInput" placeholder="Code...">

    <div id="score-hud">Score: <span id="scoreDisplay">0</span></div>

    <button id="menu-toggle-btn" onclick="toggleMenu()">Open Menu 🛠️</button>
    <button id="stats-toggle-btn" onclick="toggleStats()">Stats 📊</button>

    <div id="stats-panel">
        <h3>Live Stats</h3>
        
        <div class="stat-row">
            <span>Current Score:</span>
            <input type="number" id="editCurrentScore" class="stat-input" disabled oninput="applyCheatEdits()">
        </div>
        <div class="stat-row">
            <span>Lifetime Score:</span>
            <input type="number" id="editTotalScore" class="stat-input" disabled oninput="applyCheatEdits()">
        </div>
        
        <div class="stat-row">
            <span>Circles on Screen:</span>
            <span id="statCurrentCircles" style="color: #FFEB3B; font-weight: bold;">0</span>
        </div>
        <hr>
        <h3>Game Variables</h3>
        <div class="stat-row">
            <span>Max Circles:</span>
            <input type="number" id="editMaxCircles" class="stat-input" disabled oninput="applyCheatEdits()">
        </div>
        <div class="stat-row">
            <span>Points / Catch:</span>
            <input type="number" id="editPoints" class="stat-input" disabled oninput="applyCheatEdits()">
        </div>
        <div class="stat-row">
            <span>Min Size (px):</span>
            <input type="number" id="editMinSize" class="stat-input" disabled oninput="applyCheatEdits()">
        </div>
        <div class="stat-row">
            <span>Spawn Rate (ms):</span>
            <input type="number" id="editSpawnRate" class="stat-input" disabled oninput="applyCheatEdits()">
        </div>
    </div>

    <div id="menu-panel">
        <h3>Save & Load 💾</h3>
        <button class="menu-btn save-load-btn" onclick="saveGame()">Download Save File (.txt)</button>
        <button class="menu-btn save-load-btn" onclick="document.getElementById('fileInput').click()">Load Save from TXT</button>
        <input type="file" id="fileInput" style="display: none;" accept=".txt" onchange="loadGame(event)">

        <hr>
        <h3>Upgrades ⬆️</h3>
        
        <div class="upgrade-box">
            <p><strong>Max Circles:</strong> <span id="maxCirclesDisplay">5</span></p>
            <button class="menu-btn" id="btnMaxCircles" onclick="buyMaxCircles()">Upgrade (Cost: <span id="costMaxCircles">10</span>)</button>
        </div>
        
        <div class="upgrade-box">
            <p><strong>Points per Catch:</strong> <span id="pointsPerClickDisplay">1</span></p>
            <button class="menu-btn" id="btnPoints" onclick="buyPoints()">Upgrade (Cost: <span id="costPoints">20</span>)</button>
        </div>
        
        <div class="upgrade-box">
            <p><strong>Spawn Rate:</strong> Every <span id="spawnSpeedDisplay">1.0</span>s</p>
            <button class="menu-btn" id="btnSpeed" onclick="buySpeed()">Upgrade (Cost: <span id="costSpeed">30</span>)</button>
        </div>

        <div class="upgrade-box">
            <p><strong>Minimum Size:</strong> <span id="minSizeDisplay">40</span>px</p>
            <button class="menu-btn" id="btnMinSize" onclick="buyMinSize()">Upgrade (Cost: <span id="costMinSize">15</span>)</button>
        </div>
    </div>

    <div id="game-area"></div>

    <script>
        let state = {
            score: 0,
            totalScore: 0, 
            maxCircles: 5,
            pointsPerClick: 1,
            spawnRateMs: 1000, 
            minCircleSize: 40,
            costMaxCircles: 10,
            costPoints: 20,
            costSpeed: 30,
            costMinSize: 15
        };

        let currentCircles = 0;
        let gameInterval;
        let hoveredCircle = null;

        const scoreDisplay = document.getElementById('scoreDisplay');
        const maxCirclesDisplay = document.getElementById('maxCirclesDisplay');
        const pointsPerClickDisplay = document.getElementById('pointsPerClickDisplay');
        const spawnSpeedDisplay = document.getElementById('spawnSpeedDisplay');
        const minSizeDisplay = document.getElementById('minSizeDisplay'); 
        
        const costMaxCirclesDisplay = document.getElementById('costMaxCircles');
        const costPointsDisplay = document.getElementById('costPoints');
        const costSpeedDisplay = document.getElementById('costSpeed');
        const costMinSizeDisplay = document.getElementById('costMinSize'); 
        
        const btnMaxCircles = document.getElementById('btnMaxCircles');
        const btnPoints = document.getElementById('btnPoints');
        const btnSpeed = document.getElementById('btnSpeed');
        const btnMinSize = document.getElementById('btnMinSize'); 
        
        const gameArea = document.getElementById('game-area');
        const devCodeInput = document.getElementById('devCodeInput');
        const menuPanel = document.getElementById('menu-panel');
        const menuToggleBtn = document.getElementById('menu-toggle-btn');
        
        const statsPanel = document.getElementById('stats-panel');
        const statsToggleBtn = document.getElementById('stats-toggle-btn');
        
        const editCurrentScore = document.getElementById('editCurrentScore'); // שדה נקודות
        const editTotalScore = document.getElementById('editTotalScore');     // שדה נקודות כללי
        const editMaxCircles = document.getElementById('editMaxCircles');
        const editPoints = document.getElementById('editPoints');
        const editMinSize = document.getElementById('editMinSize');
        const editSpawnRate = document.getElementById('editSpawnRate');

        // Spacebar clicks ONLY the hovered circle
        document.addEventListener('keydown', function(event) {
            if (event.code === 'Space' || event.key === ' ') {
                event.preventDefault(); 
                if (hoveredCircle) {
                    hoveredCircle.click(); 
                    hoveredCircle = null;  
                }
            }
        });

        // Toggle Menu
        function toggleMenu() {
            if (menuPanel.style.display === 'none' || menuPanel.style.display === '') {
                menuPanel.style.display = 'block';
                menuToggleBtn.innerText = 'Close Menu ❌';
            } else {
                menuPanel.style.display = 'none';
                menuToggleBtn.innerText = 'Open Menu 🛠️';
            }
        }

        // Toggle Stats
        function toggleStats() {
            if (statsPanel.style.display === 'none' || statsPanel.style.display === '') {
                statsPanel.style.display = 'block';
                statsToggleBtn.innerText = 'Close Stats ❌';
            } else {
                statsPanel.style.display = 'none';
                statsToggleBtn.innerText = 'Stats 📊';
            }
            updateStatsUI();
        }

        // Cheat Codes Listener (CLICK, CHANGE, UNCHANGE)
        devCodeInput.addEventListener('input', function() {
            const val = this.value.toUpperCase();
            
            if (val === 'CLICK') {
                const circles = document.querySelectorAll('.circle');
                if (circles.length > 0) {
                    let earned = (circles.length * state.pointsPerClick);
                    state.score += earned;
                    state.totalScore += earned; 
                    circles.forEach(circle => circle.remove());
                    currentCircles = 0;
                    updateUI();
                }
                this.value = '';
                this.blur();
            }
            
            if (val === 'CHANGE') {
                editCurrentScore.disabled = false;
                editTotalScore.disabled = false;
                editMaxCircles.disabled = false;
                editPoints.disabled = false;
                editMinSize.disabled = false;
                editSpawnRate.disabled = false;
                
                statsPanel.style.display = 'block';
                statsToggleBtn.innerText = 'Close Stats ❌';
                
                this.value = '';
                this.blur();
            }

            if (val === 'UNCHANGE') {
                editCurrentScore.disabled = true;
                editTotalScore.disabled = true;
                editMaxCircles.disabled = true;
                editPoints.disabled = true;
                editMinSize.disabled = true;
                editSpawnRate.disabled = true;
                
                this.value = '';
                this.blur();
                updateStatsUI(); 
            }
        });

        function applyCheatEdits() {
            let newScore = parseInt(editCurrentScore.value);
            let newTotal = parseInt(editTotalScore.value);
            let newMax = parseInt(editMaxCircles.value);
            let newPoints = parseInt(editPoints.value);
            let newSize = parseInt(editMinSize.value);
            let newRate = parseInt(editSpawnRate.value);

            // בדיקות כדי לוודא שהוזנו מספרים חוקיים
            if (!isNaN(newScore)) state.score = newScore;
            if (!isNaN(newTotal)) state.totalScore = newTotal;
            if (!isNaN(newMax) && newMax >= 0) state.maxCircles = newMax;
            if (!isNaN(newPoints) && newPoints >= 1) state.pointsPerClick = newPoints;
            if (!isNaN(newSize) && newSize >= 10) state.minCircleSize = newSize;
            
            if (!isNaN(newRate) && newRate >= 10) {
                let oldRate = state.spawnRateMs;
                state.spawnRateMs = newRate;
                if (oldRate !== state.spawnRateMs) {
                    startGameLoop(); 
                }
            }

            updateUI(true); 
        }

        function initGame() {
            updateUI();
            startGameLoop();
        }

        function updateUI(isTyping = false) {
            scoreDisplay.innerText = Math.floor(state.score);
            maxCirclesDisplay.innerText = state.maxCircles;
            pointsPerClickDisplay.innerText = state.pointsPerClick;
            spawnSpeedDisplay.innerText = (state.spawnRateMs / 1000).toFixed(2);
            minSizeDisplay.innerText = state.minCircleSize;
            
            costMaxCirclesDisplay.innerText = state.costMaxCircles;
            costPointsDisplay.innerText = state.costPoints;
            costSpeedDisplay.innerText = state.costSpeed;
            costMinSizeDisplay.innerText = state.costMinSize;

            btnMaxCircles.disabled = state.score < state.costMaxCircles;
            btnPoints.disabled = state.score < state.costPoints;
            
            btnSpeed.disabled = state.score < state.costSpeed || state.spawnRateMs <= 100;
            if (state.spawnRateMs <= 100) {
                btnSpeed.innerText = "Max Speed!";
            } else {
                btnSpeed.innerHTML = `Upgrade (Cost: <span id="costSpeed">${state.costSpeed}</span>)`;
            }

            btnMinSize.disabled = state.score < state.costMinSize || state.minCircleSize >= 150;
            if (state.minCircleSize >= 150) {
                btnMinSize.innerText = "Max Size!";
            } else {
                btnMinSize.innerHTML = `Upgrade (Cost: <span id="costMinSize">${state.costMinSize}</span>)`;
            }

            updateStatsUI(isTyping);
        }

        function updateStatsUI(isTyping = false) {
            document.getElementById('statCurrentCircles').innerText = currentCircles;
            
            if (editMaxCircles.disabled || !isTyping) {
                editCurrentScore.value = Math.floor(state.score);
                editTotalScore.value = Math.floor(state.totalScore);
                editMaxCircles.value = state.maxCircles;
                editPoints.value = state.pointsPerClick;
                editMinSize.value = state.minCircleSize;
                editSpawnRate.value = state.spawnRateMs;
            }
        }

        function startGameLoop() {
            clearInterval(gameInterval);
            gameInterval = setInterval(spawnCircle, state.spawnRateMs);
        }

        function getRandomColor() {
            const h = Math.floor(Math.random() * 360);
            return `hsl(${h}, 100%, 60%)`;
        }

        function spawnCircle() {
            if (currentCircles >= state.maxCircles) return;

            const circle = document.createElement('div');
            circle.classList.add('circle');
            
            const size = Math.floor(Math.random() * 50) + state.minCircleSize;
            circle.style.width = size + 'px';
            circle.style.height = size + 'px';
            circle.style.backgroundColor = getRandomColor();

            const maxX = gameArea.clientWidth - size;
            const maxY = gameArea.clientHeight - size;
            
            const safeX = Math.max(0, Math.floor(Math.random() * maxX));
            const safeY = Math.max(0, Math.floor(Math.random() * maxY));
            
            circle.style.left = safeX + 'px';
            circle.style.top = safeY + 'px';

            circle.onmouseenter = function() { hoveredCircle = this; };
            circle.onmouseleave = function() { if (hoveredCircle === this) hoveredCircle = null; };

            circle.onclick = function() {
                state.score += state.pointsPerClick;
                state.totalScore += state.pointsPerClick; 
                currentCircles--;
                this.remove();
                hoveredCircle = null; 
                updateUI();
            };

            gameArea.appendChild(circle);
            currentCircles++;
            updateStatsUI(); 
        }

        // --- Upgrades ---

        function buyMaxCircles() {
            if (state.score >= state.costMaxCircles) {
                state.score -= state.costMaxCircles;
                state.maxCircles += 3;
                state.costMaxCircles = Math.floor(state.costMaxCircles * 1.5);
                updateUI();
            }
        }

        function buyPoints() {
            if (state.score >= state.costPoints) {
                state.score -= state.costPoints;
                state.pointsPerClick += 1;
                state.costPoints = Math.floor(state.costPoints * 1.8);
                updateUI();
            }
        }

        function buySpeed() {
            if (state.score >= state.costSpeed && state.spawnRateMs > 100) {
                state.score -= state.costSpeed;
                state.spawnRateMs = Math.max(100, Math.floor(state.spawnRateMs * 0.85));
                state.costSpeed = Math.floor(state.costSpeed * 1.6);
                updateUI();
                startGameLoop();
            }
        }

        function buyMinSize() {
            if (state.score >= state.costMinSize && state.minCircleSize < 150) {
                state.score -= state.costMinSize;
                state.minCircleSize += 10;
                state.costMinSize = Math.floor(state.costMinSize * 1.5);
                updateUI();
            }
        }

        // --- Save & Load ---

        function saveGame() {
            let dataString = JSON.stringify(state);
            if (devCodeInput.value !== "BEN") dataString = btoa(dataString);

            const blob = new Blob([dataString], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = 'CatchCircles_Save.txt';
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function loadGame(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                let fileContent = e.target.result;
                let loadedState;

                try {
                    loadedState = JSON.parse(fileContent);
                } catch (err1) {
                    try {
                        loadedState = JSON.parse(atob(fileContent));
                    } catch (err2) {
                        alert("Error! The file doesn't seem to be a valid save file.");
                        event.target.value = '';
                        return;
                    }
                }
                
                state = { ...state, ...loadedState }; 
                if (typeof state.totalScore === 'undefined') state.totalScore = state.score;

                gameArea.innerHTML = '';
                currentCircles = 0;
                
                updateUI();
                startGameLoop();
                alert("Game loaded successfully from file! 🎮");
                
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        initGame();
    </script>
</body>
</html>
