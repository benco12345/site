<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Catch the Circles - Ultimate Full Game</title>
    <style>
        /* [הדבק כאן את כל ה-CSS המקורי שלך מההודעה הראשונה] */
        body { margin: 0; font-family: 'Segoe UI', sans-serif; height: 100vh; background-color: red; overflow: hidden; }
        .panel { display: none; position: absolute; bottom: 80px; width: 300px; background: rgba(50,50,50,0.95); color: white; padding: 20px; border-radius: 15px; z-index: 1000; }
        .circle { position: absolute; border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .upgrade-box { background: #444; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .btn-action { padding: 10px; cursor: pointer; background: #2196F3; color: white; border: none; border-radius: 5px; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="score-hud">ניקוד: <span id="scoreDisplay">0</span></div>
    <div id="game-area"></div>

    <section id="menu-panel" class="panel" style="display: block;">
        <h3>שדרוגים</h3>
        <div class="upgrade-box">
            <p><strong>Circle Lifetime:</strong> <span id="lifetimeDisplay">10</span>s</p>
            <button class="btn-action" onclick="buyLifetime()">Upgrade (Cost: <span id="costLifetime">25</span>)</button>
        </div>
        </section>

    <section id="stats-panel" class="panel">
        <h3>סטטיסטיקות וצ'יטים</h3>
        <input type="text" id="editLifetime" placeholder="Lifetime or INFINITE" oninput="applyCheatEdits()">
    </section>

    <script>
        // המצב ההתחלתי (State) המקורי שלך בתוספת המשתנים החדשים
        let state = { 
            score: 0, 
            pointsPerClick: 1, 
            circleLifetime: 10, 
            costLifetime: 25, 
            isInfinite: false,
            // [הוסף כאן את שאר המשתנים המקוריים שלך כמו maxCircles, spawnRateMs וכו']
            language: 'he' 
        };

        // --- הלוגיקה החדשה ---
        function buyLifetime() {
            if (state.score >= state.costLifetime) {
                state.score -= state.costLifetime;
                if (state.circleLifetime < 100) state.circleLifetime += 10;
                else state.isInfinite = true;
                state.costLifetime = Math.floor(state.costLifetime * 1.5);
                updateUI();
            }
        }

        function applyCheatEdits() {
            const val = document.getElementById('editLifetime').value.toUpperCase();
            if (val === 'INFINITE') {
                state.isInfinite = true;
                updateUI();
            } else if (val !== "") {
                state.circleLifetime = parseInt(val) || 10;
                state.isInfinite = false;
                updateUI();
            }
        }

        // --- הפונקציה המקורית עם לוגיקת הטיימר ---
        function spawnCircle(force = false) {
            const circle = document.createElement('div');
            circle.className = 'circle';
            circle.style.width = circle.style.height = '50px';
            circle.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
            circle.style.left = Math.random() * (window.innerWidth - 50) + 'px';
            circle.style.top = Math.random() * (window.innerHeight - 50) + 'px';

            // טיימר להסרה אוטומטית אם לא אינסופי
            if (!state.isInfinite) {
                circle.dataset.timer = setTimeout(() => {
                    circle.remove();
                }, state.circleLifetime * 1000);
            }

            circle.onclick = function() {
                if (this.dataset.timer) clearTimeout(this.dataset.timer);
                state.score += state.pointsPerClick;
                this.remove();
                updateUI();
            };
            document.getElementById('game-area').appendChild(circle);
        }

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = Math.floor(state.score);
            document.getElementById('lifetimeDisplay').innerText = state.isInfinite ? "∞" : state.circleLifetime;
            document.getElementById('costLifetime').innerText = state.costLifetime;
        }

        // [כאן תדביק את פונקציות השמירה, הטעינה והקיצורים המקוריים שלך]
        // ... (השאר נשאר אותו דבר)
        setInterval(spawnCircle, 1000);
    </script>
</body>
</html>
