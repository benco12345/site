<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catch the Circles - Ultimate Build</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; height: 100dvh; overflow: hidden; background-color: red; position: relative; touch-action: manipulation; }
        #devCodeInput { position: absolute; top: 10px; right: 10px; z-index: 100; color: black; background: rgba(255, 255, 255, 0.9); border: 2px solid black; padding: 5px; font-weight: bold; width: 120px; }
        #btnAbout { position: absolute; top: 10px; left: 10px; z-index: 100; background: #2196F3; color: white; border: 2px solid white; border-radius: 5px; padding: 5px 12px; font-weight: bold; cursor: pointer; }
        #score-hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 28px; font-weight: bold; color: white; background: rgba(0, 0, 0, 0.7); padding: 10px 30px; border-radius: 15px; z-index: 50; pointer-events: none; }
        #bottom-nav { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-evenly; z-index: 1000; pointer-events: none; }
        .bottom-btn { pointer-events: auto; padding: 12px 20px; font-weight: bold; color: white; border: 3px solid white; border-radius: 30px; cursor: pointer; background: #333; }
        .panel { position: absolute; bottom: 80px; z-index: 999; background: rgba(40, 40, 60, 0.95); color: white; padding: 20px; border-radius: 15px; display: none; border: 2px solid #555; }
        #game-area { width: 100vw; height: 100dvh; position: absolute; top: 0; left: 0; z-index: 1; }
        .circle { position: absolute; border-radius: 50%; cursor: pointer; box-shadow: inset -5px -5px 15px rgba(0,0,0,0.3); animation: popIn 0.3s forwards; }
        @keyframes popIn { to { transform: scale(1); } }
    </style>
</head>
<body>

    <input type="text" id="devCodeInput" placeholder="Code...">
    <button id="btnAbout" onclick="alert('Catch the Circles - Ultimate Build 2026')">About</button>
    <div id="score-hud">Score: <span id="scoreDisplay">0</span></div>

    <div id="bottom-nav">
        <button class="bottom-btn" onclick="document.getElementById('menu-panel').style.display = document.getElementById('menu-panel').style.display === 'block' ? 'none' : 'block'">Menu</button>
        <button class="bottom-btn" onclick="document.getElementById('settings-panel').style.display = document.getElementById('settings-panel').style.display === 'block' ? 'none' : 'block'">Settings</button>
        <button class="bottom-btn" onclick="document.getElementById('stats-panel').style.display = document.getElementById('stats-panel').style.display === 'block' ? 'none' : 'block'">Stats</button>
    </div>

    <div id="menu-panel" class="panel"><h3>Menu</h3><button class="bottom-btn" onclick="saveGame()">Save Game</button></div>
    <div id="settings-panel" class="panel"><h3>Settings</h3></div>
    <div id="stats-panel" class="panel"><h3>Stats</h3></div>

    <div id="game-area"></div>

    <script>
        let state = {
            score: 0,
            maxCircles: 5,
            pointsPerClick: 1,
            spawnRateMs: 1000,
            minCircleSize: 40,
            circleLifetime: 10000,
            isInfiniteLifetime: false
        };

        let currentCircles = 0;
        const gameArea = document.getElementById('game-area');
        const devCodeInput = document.getElementById('devCodeInput');

        devCodeInput.addEventListener('input', function() {
            if (this.value.toUpperCase() === 'INFINITE') {
                state.isInfiniteLifetime = true;
                alert("Lifetime set to Infinite!");
                this.value = '';
            }
        });

        function spawnCircle() {
            if (currentCircles >= state.maxCircles) return;

            const circle = document.createElement('div');
            circle.classList.add('circle');
            const size = Math.floor(Math.random() * 50) + state.minCircleSize;
            
            circle.style.width = size + 'px';
            circle.style.height = size + 'px';
            circle.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
            circle.style.left = Math.random() * (window.innerWidth - size) + 'px';
            circle.style.top = Math.random() * (window.innerHeight - size) + 'px';

            let timer;
            if (!state.isInfiniteLifetime) {
                timer = setTimeout(() => {
                    if (circle.parentElement) {
                        circle.remove();
                        currentCircles--;
                        state.score = Math.max(0, state.score - 5);
                        document.getElementById('scoreDisplay').innerText = state.score;
                    }
                }, state.circleLifetime);
            }

            circle.onclick = function() {
                if (!state.isInfiniteLifetime) clearTimeout(timer);
                state.score += state.pointsPerClick;
                currentCircles--;
                this.remove();
                document.getElementById('scoreDisplay').innerText = state.score;
            };

            gameArea.appendChild(circle);
            currentCircles++;
        }

        function saveGame() {
            const dataStr = JSON.stringify(state);
            const blob = new Blob([dataStr], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "save.txt";
            a.click();
        }

        setInterval(spawnCircle, state.spawnRateMs);
    </script>
</body>
</html>
