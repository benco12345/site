<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Catch the Circles Game</title>
    <style>
        body { margin: 0; background: red; overflow: hidden; font-family: sans-serif; }
        #game-area { width: 100vw; height: 100vh; position: relative; }
        .circle { position: absolute; border-radius: 50%; cursor: pointer; border: 2px solid white; }
        .panel { display: none; position: absolute; top: 20%; left: 30%; width: 40%; background: #333; color: white; padding: 20px; border-radius: 10px; z-index: 100; }
        .bottom-btn { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <nav>
        <button class="bottom-btn" onclick="toggleMenu()">תפריט/שדרוגים 🛠️</button>
    </nav>

    <div id="game-area"></div>

    <section id="menu-panel" class="panel">
        <h3>שדרוגים ⬆️</h3>
        <p><strong>Circle Lifetime:</strong> <span id="lifetimeDisplay">10</span>s</p>
        <button onclick="buyLifetime()">שדרג זמן עיגול (מחיר: <span id="costLifetime">25</span>)</button>
        <p>ניקוד: <span id="scoreDisplay">0</span></p>
    </section>

    <script>
        // --- לוגיקה ---
        let state = { score: 0, circleLifetime: 10, costLifetime: 25, isInfinite: false };

        function updateUI() {
            document.getElementById('scoreDisplay').innerText = state.score;
            document.getElementById('lifetimeDisplay').innerText = state.isInfinite ? "∞" : state.circleLifetime;
            document.getElementById('costLifetime').innerText = state.costLifetime;
        }

        function buyLifetime() {
            if (state.score >= state.costLifetime) {
                state.score -= state.costLifetime;
                if (state.circleLifetime < 100) {
                    state.circleLifetime += 10;
                } else {
                    state.isInfinite = true;
                }
                state.costLifetime = Math.floor(state.costLifetime * 1.5);
                updateUI();
            }
        }

        function spawnCircle() {
            const circle = document.createElement('div');
            circle.className = 'circle';
            const size = 50;
            circle.style.width = size + 'px';
            circle.style.height = size + 'px';
            circle.style.background = 'blue';
            circle.style.left = Math.random() * (window.innerWidth - size) + 'px';
            circle.style.top = Math.random() * (window.innerHeight - size) + 'px';

            if (!state.isInfinite) {
                circle.dataset.timer = setTimeout(() => circle.remove(), state.circleLifetime * 1000);
            }

            circle.onclick = function() {
                if (this.dataset.timer) clearTimeout(this.dataset.timer);
                state.score++;
                this.remove();
                updateUI();
            };
            document.getElementById('game-area').appendChild(circle);
        }

        function toggleMenu() {
            const p = document.getElementById('menu-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        setInterval(spawnCircle, 2000);
    </script>
</body>
</html>
