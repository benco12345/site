<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טיימר</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background-color: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        #timer {
            font-size: 60px;
            font-weight: bold;
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
        }

        button:hover {
            background-color: #45a049;
        }

        button:focus {
            outline: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>טיימר</h1>
        <div id="timer">00:00</div>
        <button id="startStop" onclick="startStop()">התחל</button>
        <button id="reset" onclick="resetTimer()">אפס</button>
    </div>

    <script>
        let timer;
        let isRunning = false;
        let seconds = 0;
        let minutes = 0;

        function startStop() {
            if (isRunning) {
                clearInterval(timer);
                document.getElementById("startStop").textContent = "התחל";
            } else {
                timer = setInterval(function() {
                    seconds++;
                    if (seconds === 60) {
                        seconds = 0;
                        minutes++;
                    }
                    document.getElementById("timer").textContent = formatTime(minutes, seconds);
                }, 1000);
                document.getElementById("startStop").textContent = "עצור";
            }
            isRunning = !isRunning;
        }

        function resetTimer() {
            clearInterval(timer);
            minutes = 0;
            seconds = 0;
            document.getElementById("timer").textContent = "00:00";
            document.getElementById("startStop").textContent = "התחל";
            isRunning = false;
        }

        function formatTime(mins, secs) {
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }
    </script>
</body>
</html>
