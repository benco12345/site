<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>האתר של אבא</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: linear-gradient(135deg, red, orange, yellow, green, blue, indigo, violet);
      background-size: 300% 300%;
      animation: rainbow 20s linear infinite;
      color: white;
      text-align: center;
      padding-top: 50px;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      font-size: 3em;
      margin: 0 0 30px 0;
      text-shadow: 2px 2px 5px black;
      position: relative;
      z-index: 2;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
      z-index: 2;
      position: relative;
    }

    button {
      font-size: 1.2em;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      cursor: pointer;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
      transition: background-color 0.3s ease;
      min-width: 220px;
    }

    button:hover {
      background-color: rgba(0, 0, 0, 0.8);
    }

    /* נצנצים */
    .sparkle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.8;
      animation: sparkle 3s linear infinite;
    }

    @keyframes sparkle {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) scale(0.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <h1>האתר של אבא</h1>
  <div class="button-container">
    <button onclick="window.open('https://www.youtube.com/@dotanccohen', '_blank')">
      כנסו ליוטיוב של אבא
    </button>
    <button onclick="window.open('https://benco12345.github.io/site/%D7%98%D7%99%D7%99%D7%9E%D7%A8%20%D7%90%D7%91%D7%90.html', '_blank')">
      כנסו לטיימר של אבא
    </button>
    <button onclick="window.open('https://benco12345.github.io/site/%D7%A1%D7%AA%D7%95%D7%A4%D7%A8%20%D7%90%D7%91%D7%90.html', '_blank')">
      כנסו לסתופר של אבא
    </button>
  </div>

  <script>
    // יצירת נצנצים
    for (let i = 0; i < 100; i++) {
      const sparkle = document.createElement("div");
      sparkle.classList.add("sparkle");
      sparkle.style.left = Math.random() * 100 + "vw";
      sparkle.style.top = Math.random() * 100 + "vh";
      sparkle.style.animationDelay = Math.random() * 5 + "s";
      sparkle.style.opacity = Math.random();
      document.body.appendChild(sparkle);
    }
  </script>
</body>
</html>
